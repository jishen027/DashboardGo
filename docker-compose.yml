services:
  dashboardgo:
    image: dashboardgo:latest
    container_name: dashboardgo
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Named volume — Docker initialises it from the image's /app/config/ on
      # first creation and persists all subsequent edits across restarts/redeploys.
      - dashboardgo_config:/app/config
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/config"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  dashboardgo_config:
