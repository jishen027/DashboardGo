name: Deploy DashboardGo

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: self-hosted
    timeout-minutes: 20

    steps:
      # ── 1. Source ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        env:
          GIT_TOKEN: ${{ github.token }}
        run: |
          ORIGIN="https://x-access-token:${GIT_TOKEN}@github.com/${{ github.repository }}.git"
          if git rev-parse --git-dir > /dev/null 2>&1; then
            git remote set-url origin "$ORIGIN"
            git fetch origin
            git reset --hard "${{ github.sha }}"
            git clean -ffd
          else
            git clone "$ORIGIN" .
            git checkout "${{ github.sha }}"
          fi
          # Remove token from remote URL immediately after fetch
          git remote set-url origin "https://github.com/${{ github.repository }}.git"

      # ── 2. Docker Buildx ──────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        run: |
          if ! docker buildx inspect dashboardgo-builder > /dev/null 2>&1; then
            docker buildx create \
              --name dashboardgo-builder \
              --driver docker-container \
              --driver-opt network=host
          fi
          docker buildx use dashboardgo-builder
          docker buildx inspect --bootstrap

      # ── 3. Build ──────────────────────────────────────────────────────────────
      - name: Build image
        run: |
          mkdir -p /tmp/.buildx-cache
          docker buildx build \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --load \
            --tag dashboardgo:latest \
            .

      - name: Rotate build cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      # ── 4. Deploy ─────────────────────────────────────────────────────────────
      - name: Deploy container
        run: |
          docker compose down --remove-orphans --timeout 10
          docker compose up -d

      # ── 5. Prune old images ───────────────────────────────────────────────────
      - name: Remove dangling images
        if: always()
        run: docker image prune -f
