name: Deploy DashboardGo

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: self-hosted
    timeout-minutes: 20

    steps:
      # ── 1. Source ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Docker layer cache (persisted between runs on the self-hosted runner)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: dashboardgo:latest
          load: true
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # Rotate cache so it never grows unboundedly
      - name: Rotate build cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      # ── 4. Deploy ─────────────────────────────────────────────────────────────
      - name: Deploy container
        run: |
          docker compose down --remove-orphans --timeout 10
          docker compose up -d

      # ── 5. Prune old images ───────────────────────────────────────────────────
      - name: Remove dangling images
        if: always()
        run: docker image prune -f
