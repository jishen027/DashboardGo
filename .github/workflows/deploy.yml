name: Deploy DashboardGo

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: self-hosted
    timeout-minutes: 20

    steps:
      # ── 1. Source ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        env:
          GIT_TOKEN: ${{ github.token }}
        run: |
          ORIGIN="https://x-access-token:${GIT_TOKEN}@github.com/${{ github.repository }}.git"
          if git rev-parse --git-dir > /dev/null 2>&1; then
            git remote set-url origin "$ORIGIN"
            git fetch origin
            git reset --hard "${{ github.sha }}"
            git clean -ffd
          else
            git clone "$ORIGIN" .
            git checkout "${{ github.sha }}"
          fi
          # Remove token from remote URL immediately after fetch
          git remote set-url origin "https://github.com/${{ github.repository }}.git"

      # ── 2. Runtime environment ───────────────────────────────────────────────
      # Write secrets to .env AFTER checkout (git clean -ffd would delete it).
      # docker-compose.yml loads this file via env_file so the container gets
      # all five Logto vars at runtime without baking secrets into the image.
      - name: Write runtime environment
        env:
          LOGTO_ENDPOINT: ${{ secrets.LOGTO_ENDPOINT }}
          LOGTO_APP_ID: ${{ secrets.LOGTO_APP_ID }}
          LOGTO_APP_SECRET: ${{ secrets.LOGTO_APP_SECRET }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          LOGTO_COOKIE_SECRET: ${{ secrets.LOGTO_COOKIE_SECRET }}
        run: |
          {
            echo "LOGTO_ENDPOINT=$LOGTO_ENDPOINT"
            echo "LOGTO_APP_ID=$LOGTO_APP_ID"
            echo "LOGTO_APP_SECRET=$LOGTO_APP_SECRET"
            echo "NEXT_PUBLIC_APP_URL=$NEXT_PUBLIC_APP_URL"
            echo "LOGTO_COOKIE_SECRET=$LOGTO_COOKIE_SECRET"
          } > .env

      # ── 3. Docker Buildx ──────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        run: |
          if ! docker buildx inspect dashboardgo-builder > /dev/null 2>&1; then
            docker buildx create \
              --name dashboardgo-builder \
              --driver docker-container \
              --driver-opt network=host
          fi
          docker buildx use dashboardgo-builder
          docker buildx inspect --bootstrap

      # ── 4. Build ──────────────────────────────────────────────────────────────
      - name: Build image
        run: |
          mkdir -p /tmp/.buildx-cache
          docker buildx build \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --load \
            --tag dashboardgo:latest \
            .

      - name: Rotate build cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      # ── 5. Deploy ─────────────────────────────────────────────────────────────
      - name: Deploy container
        run: |
          docker compose down --remove-orphans --timeout 10
          docker compose up -d

      # ── 6. Prune old images ───────────────────────────────────────────────────
      - name: Remove dangling images
        if: always()
        run: docker image prune -f
